```html
<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOKUNIKI Art Studio- Multi Tab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

            width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md shadow-blue-500/30 hidden sm:block">
                    <i data-lucide="layers" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-sm sm:text-lg font-bold text-slate-900">ISOKUNIKI Art Studio</h1>
                    <p id="user-badge" class="text-[9px] sm:text-[10px] text-slate-500 font-bold tracking-wider uppercase">Loading...</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 sm:space-x-3">
                <select id="sheet-selector" onchange="changeSheet()" class="bg-slate-100 border border-slate-200 text-slate-700 text-xs sm:text-sm font-semibold rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 max-w-[120px] sm:max-w-[200px]">
                    <option value="">Memuat Sheet...</option>
                </select>

                <button onclick="promptLogin()" class="p-1.5 text-slate-500 hover:text-slate-800 transition-colors" title="Ganti Mode">
                    <i data-lucide="user-circle" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div id="setup-warning" class="hidden bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg mb-8 shadow-sm">
            <div class="flex items-start">
                <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-500 mt-0.5"></i>
                <div class="ml-3 w-full">
                    <h3 class="text-sm font-bold text-amber-800">Setup Database Google Sheets</h3>
                    <div class="flex items-center mt-3">
                        <input type="text" id="api-url-input" placeholder="Paste URL Web App di sini..." class="flex-grow bg-white border border-amber-300 rounded-l-md px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-amber-500">
                        <button onclick="saveApiUrl()" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-4 py-2 rounded-r-md transition-colors">Simpan Tautan</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div id="admin-panel" class="lg:col-span-4 hidden">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-24">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                        <h2 id="form-title" class="text-base font-bold flex items-center">
                            <i data-lucide="file-plus" class="w-5 h-5 mr-2 text-blue-600"></i> Kelola Data
                        </h2>
                        <span id="edit-badge" class="hidden bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-1 rounded uppercase">Mode Edit</span>
                    </div>

                    <form id="crud-form" class="space-y-4">
                        <input type="hidden" id="entry-id" value="">
                        <div id="dynamic-form-fields" class="space-y-4 text-sm">
                            </div>
                        <div class="pt-4 flex flex-col space-y-2">
                            <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center">
                                <i data-lucide="save" class="w-4 h-4 mr-2"></i> <span id="btn-submit-text">Simpan Data</span>
                            </button>
                            <button type="button" id="btn-cancel" onclick="resetForm()" class="hidden w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-lg text-sm transition-colors">Batal Edit</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="table-panel" class="lg:col-span-12">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full min-h-[500px] relative">
                    
                    <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                        <div>
                            <h2 class="text-base font-bold flex items-center">
                                <i data-lucide="database" class="w-5 h-5 mr-2 text-slate-600"></i> Pustaka Data
                            </h2>
                            <p id="search-count" class="text-xs text-slate-500 mt-1 font-medium ml-7"></p>
                        </div>
                        
                        <div class="relative w-full sm:w-72 flex space-x-2">
                            <div class="relative flex-grow">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                                <input type="text" id="search-input" placeholder="Cari data..." onkeyup="filterTable()" class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <button onclick="fetchData()" class="bg-blue-50 text-blue-600 p-2 rounded-lg border border-blue-100 hover:bg-blue-100 transition-colors" title="Muat Ulang Data">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto flex-grow">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr id="table-head" class="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider"></tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                    
                    <div id="loading-indicator" class="hidden bg-white/90 backdrop-blur-sm absolute inset-0 flex flex-col items-center justify-center z-10">
                        <div class="loader mb-3"></div>
                        <p class="text-sm font-bold text-blue-600 animate-pulse" id="loading-text">Memproses...</p>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        // Elemen
        const setupWarning = document.getElementById('setup-warning');
        const apiUrlInput = document.getElementById('api-url-input');
        const sheetSelector = document.getElementById('sheet-selector');
        const adminPanel = document.getElementById('admin-panel');
        const tablePanel = document.getElementById('table-panel');
        const searchCount = document.getElementById('search-count');
        const dynamicFormFields = document.getElementById('dynamic-form-fields');
        const tableHead = document.getElementById('table-head');
        const tableBody = document.getElementById('table-body');
        const loadingIndicator = document.getElementById('loading-indicator');
        const form = document.getElementById('crud-form');
        
        const ADMIN_PIN = "5 Amal";
        let WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw9-amLt21Ye6vFTpJvJZyfS-GTFZ8qAuDLq-mMxW-7Xkxbdr36iVzgMT6SE4zN_Xo/exec";
        let userRole = 'guest';
        let currentData = [];
        let globalHeaders = [];
        let isEditing = false;
        let activeSheetName = '';

        window.onload = async () => {
            try {
                await promptLogin();
                await loadSheetsList();
            } catch (e) {
                console.error(e);
                Swal.fire('Error','Gagal terhubung ke database','error');
            }
        };

        async function promptLogin() {
            const result = await Swal.fire({
                title: 'Pilih Mode', icon: 'question', showCancelButton: true,
                confirmButtonText: 'Administrator', cancelButtonText: 'Pengunjung',
                confirmButtonColor: '#3b82f6', cancelButtonColor: '#10b981', allowOutsideClick: false
            });

            if (result.isConfirmed) {
                const { value: pin } = await Swal.fire({
                    title: 'PIN Admin', input: 'password', confirmButtonColor: '#3b82f6', allowOutsideClick: false
                });
                if (pin === ADMIN_PIN) {
                    userRole = 'admin';
                    Swal.fire({ icon: 'success', title: 'Akses Admin', timer: 1500, showConfirmButton: false });
                } else {
                    Swal.fire('Akses Ditolak', 'PIN salah!', 'error'); userRole = 'guest';
                }
            } else { userRole = 'guest'; }
            applyRoleUI();
        }

        function applyRoleUI() {
            document.getElementById('user-badge').innerText = userRole === 'admin' ? "Mode: ADMIN" : "Mode: PENGUNJUNG";
            document.getElementById('user-badge').className = userRole === 'admin' ? "text-[10px] text-blue-500 font-bold uppercase" : "text-[10px] text-emerald-500 font-bold uppercase";
            if (userRole === 'admin') {
                adminPanel.classList.remove('hidden'); tablePanel.className = "lg:col-span-8";
            } else {
                adminPanel.classList.add('hidden'); tablePanel.className = "lg:col-span-12";
            }
            if(currentData.length > 0) renderTable(currentData);
        }

        function saveApiUrl() { return; }

        function showLoading(txt) { document.getElementById('loading-text').innerText = txt; loadingIndicator.classList.remove('hidden'); }
        function hideLoading() { loadingIndicator.classList.add('hidden'); }

        // ==========================================
        // FITUR MULTI-SHEET
        // ==========================================
        async function loadSheetsList() {
            showLoading('Mendeteksi Sheets...');
            try {
                const res = await fetch(WEB_APP_URL + "?action=getSheets&t=" + new Date().getTime());
                const json = await res.json();
                if (json.status === 'success') {
                    sheetSelector.innerHTML = '';
                    json.sheets.forEach(s => {
                        sheetSelector.innerHTML += `<option value="${s}">${s}</option>`;
                    });
                    activeSheetName = json.sheets[0]; // Set default ke sheet pertama
                    fetchData();
                }
            } catch(e) { Swal.fire('Error', 'Gagal memuat daftar sheet.', 'error'); hideLoading(); }
        }

        function changeSheet() {
            activeSheetName = sheetSelector.value;
            resetForm(); // Bersihkan form jika pindah tab
            fetchData();
        }

        // ==========================================
        // AMBIL DATA & GENERATE FORM DROPDOWN
        // ==========================================
        async function fetchData() {
            showLoading(`Mengambil data dari Sheet: ${activeSheetName}...`);
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getData&sheet=${encodeURIComponent(activeSheetName)}&t=${new Date().getTime()}`);
                const json = await res.json();
                
                if (json.status === 'success') {
                    globalHeaders = json.headers;
                    currentData = json.data;
                    generateDynamicForm();
                    renderTable(currentData);
                }
            } catch (e) {
                tableBody.innerHTML = `<tr><td class="p-6 text-center text-red-500">Koneksi Gagal. Cek URL Web App.</td></tr>`;
            } finally { hideLoading(); }
        }

        function generateDynamicForm() {
            let html = '';
            globalHeaders.forEach(header => {
                if (header.toUpperCase() !== 'ID') {
                    // Deteksi Fitur Dropdown dengan pola: Nama Kolom [Opsi1, Opsi2]
                    let isDropdown = false;
                    let options = [];
                    let labelName = header;

                    const match = header.match(/(.*)\[(.*)\]/);
                    if (match) {
                        isDropdown = true;
                        labelName = match[1].trim(); // Nama label tanpa kurung siku
                        options = match[2].split(',').map(s => s.trim()); // Daftar pilihan
                    }

                    if (isDropdown) {
                        html += `
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wider">${labelName}</label>
                                <select id="input-${header}" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all cursor-pointer">
                                    <option value="" disabled selected>-- Pilih ${labelName} --</option>
                                    ${options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                </select>
                            </div>
                        `;
                    } else {
                        // Input Biasa
                        let type = 'text';
                        if (header.toLowerCase().includes('email')) type = 'email';
                        if (header.toLowerCase().includes('telepon')) type = 'tel';
                        
                        html += `
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wider">${header}</label>
                                <input type="${type}" id="input-${header}" required placeholder="Isi ${header}..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                            </div>
                        `;
                    }
                }
            });
            dynamicFormFields.innerHTML = html;
        }

        // ==========================================
        // RENDER TABEL & HITUNG PENCARIAN
        // ==========================================
        function renderTable(dataArray) {
            // Update Indikator Jumlah Data (Pencarian)
            searchCount.innerText = `Menampilkan ${dataArray.filter(r=>r.ID).length} baris data`;

            // Bersihkan Header Tampilan (Hapus kurung siku saat tampil di tabel)
            let headHtml = '';
            globalHeaders.forEach(header => {
                if (header.toUpperCase() !== 'ID') {
                    let displayName = header.replace(/\[.*?\]/g, '').trim(); // Hapus opsi dari header
                    headHtml += `<th class="px-6 py-3 font-bold border-b border-slate-200">${displayName}</th>`;
                }
            });
            if (userRole === 'admin') headHtml += `<th class="px-6 py-3 border-b border-slate-200 text-right">Aksi</th>`;
            tableHead.innerHTML = headHtml;

            if (dataArray.length === 0 || !dataArray.some(r => r.ID)) {
                tableBody.innerHTML = `<tr><td colspan="10" class="px-6 py-10 text-center text-slate-500">Data kosong di Sheet ini.</td></tr>`;
                return;
            }

            tableBody.innerHTML = '';
            dataArray.reverse().forEach(row => {
                if (!row.ID) return;
                let rowHtml = '';
                globalHeaders.forEach(header => {
                    if (header.toUpperCase() !== 'ID') {
                        let isPilihan = header.includes('[');
                        let val = row[header] || '-';
                        
                        // Jika kolom adalah pilihan, berikan warna latar belakang agar estetik
                        if(isPilihan && val !== '-') {
                            rowHtml += `<td class="px-6 py-4 whitespace-nowrap"><span class="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md text-xs font-bold">${val}</span></td>`;
                        } else {
                            rowHtml += `<td class="px-6 py-4 whitespace-nowrap text-slate-600">${val}</td>`;
                        }
                    }
                });

                if (userRole === 'admin') {
                    rowHtml += `
                        <td class="px-6 py-4 whitespace-nowrap text-right space-x-1">
                            <button onclick="editData('${row.ID}')" class="p-1.5 bg-blue-100 text-blue-600 rounded"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="deleteData('${row.ID}')" class="p-1.5 bg-rose-100 text-rose-600 rounded"><i data-lucide="trash" class="w-4 h-4"></i></button>
                        </td>
                    `;
                }
                const tr = document.createElement('tr'); tr.innerHTML = rowHtml; tableBody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function filterTable() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const filtered = currentData.filter(row => {
                if (!row.ID) return false;
                return Object.values(row).join(' ').toLowerCase().includes(keyword);
            });
            renderTable(filtered); // Otomatis mengupdate teks jumlah pencarian di dalam fungsi ini
        }

        // ==========================================
        // SIMPAN / EDIT / HAPUS (Kirim nama Sheet juga)
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const recordData = {};
            globalHeaders.forEach(h => {
                if (h.toUpperCase() !== 'ID') recordData[h] = document.getElementById(`input-${h}`).value.trim();
            });

            const action = isEditing ? 'update' : 'create';
            const formData = new URLSearchParams();
            formData.append('action', action);
            formData.append('sheet', activeSheetName); // Beritahu backend untuk simpan di sheet mana
            if (isEditing) formData.append('id', document.getElementById('entry-id').value);
            formData.append('data', JSON.stringify(recordData));

            showLoading('Menyimpan...');
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: formData });
                const json = await res.json();
                if (json.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Sukses!', timer: 1500, showConfirmButton: false });
                    resetForm(); fetchData();
                } else Swal.fire('Gagal', json.message, 'error');
            } catch (err) { Swal.fire('Error', 'Koneksi gagal', 'error'); hideLoading(); }
        });

        function editData(id) {
            const dataToEdit = currentData.find(i => i.ID === id);
            document.getElementById('entry-id').value = id;
            globalHeaders.forEach(h => {
                if (h.toUpperCase() !== 'ID') document.getElementById(`input-${h}`).value = dataToEdit[h];
            });
            isEditing = true;
            document.getElementById('btn-submit-text').innerText = 'Simpan Perubahan';
            document.getElementById('btn-submit').className = "w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center";
            document.getElementById('btn-cancel').classList.remove('hidden');
            document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            form.reset(); isEditing = false; document.getElementById('entry-id').value = '';
            document.getElementById('btn-submit-text').innerText = 'Simpan Data';
            document.getElementById('btn-submit').className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function deleteData(id) {
            Swal.fire({ title: 'Hapus Data?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Hapus', confirmButtonColor: '#f43f5e'
            }).then(async (res) => {
                if (res.isConfirmed) {
                    const formData = new URLSearchParams();
                    formData.append('action', 'delete'); formData.append('sheet', activeSheetName); formData.append('id', id);
                    showLoading('Menghapus...');
                    try {
                        const response = await fetch(WEB_APP_URL, { method: 'POST', body: formData });
                        const data = await response.json();
                        if (data.status === 'success') fetchData();
                    } catch (e) { Swal.fire('Error', 'Gagal hapus', 'error'); hideLoading(); }
                }
            });
        }
    </script>
</body>
</html>
